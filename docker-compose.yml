x-superset-depends-on: &superset-depends-on
  - db
  - redis

x-superset-volumes: &superset-volumes
  # Menyambungkan file config lokal ke dalam sistem Superset
  - ./superset_config.py:/app/pythonpath/superset_config.py

services:
  redis:
    image: redis:7
    container_name: superset_cache
    restart: unless-stopped
    volumes:
      - redis_data:/data

  db:
    image: postgres:14
    container_name: superset_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data

  superset:
    build: . # Menggunakan Dockerfile yang kamu buat
    container_name: superset_app
    restart: unless-stopped
    ports:
      - "8088:8088"
    depends_on: *superset-depends-on
    volumes: *superset-volumes
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      CACHE_CONFIG: '{"CACHE_TYPE": "RedisCache", "CACHE_DEFAULT_TIMEOUT": 86400, "CACHE_KEY_PREFIX": "superset_", "CACHE_REDIS_URL": "redis://redis:6379/0"}'

  superset-init:
    build: .
    container_name: superset_init
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-permissions &&
      superset fab security-converge &&
      superset fab create-admin --username ${SUPERSET_ADMIN_USERNAME} --firstname ${SUPERSET_ADMIN_FIRSTNAME} --lastname ${SUPERSET_ADMIN_LASTNAME} --email ${SUPERSET_ADMIN_EMAIL} --password ${SUPERSET_ADMIN_PASSWORD} &&
      superset init"
    depends_on: *superset-depends-on
    volumes: *superset-volumes
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"

volumes:
  redis_data:
  db_data: